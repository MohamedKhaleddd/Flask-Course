    {% extends 'base.html' %}
    {% block title %}{{title}}{% endblock %}

    <form action="/add-user" method="POST">
        {{form.hidden_tag()}}
        {%for field in form if field.name!= "csrf_token"%}

            <label>{{field.label}}</label>
            {{field}}

        </div>
        {%endfor%}
    </form>
    {% endblock %}
